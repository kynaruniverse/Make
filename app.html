<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Maké — Your Command Center</title>
  <meta name="description" content="A personal command center. Floating sticky notes, rich-text notes, code snippets, and quick links — all in one offline-first PWA.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#9ba59a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Maké">

  <!-- iOS Safari (partial PWA) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maké">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Preconnect to Google Favicons (used by link buttons) -->
  <link rel="preconnect" href="https://www.google.com" crossorigin>

  <!-- Fonts: Inter (UI) + JetBrains Mono (code editor) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(r  => console.log('[Maké SW] registered:', r.scope))
          .catch(e => console.warn('[Maké SW] failed:', e));
      });
    }
  </script>
</body>
</html>
