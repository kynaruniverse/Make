<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Maké — Layout Editor</title>
<style>
:root {
  --rose:#b68d93;--rose-d:#9e7279;--sage:#9ba59a;--sage-d:#6b7c7a;
  --panel:#161b1a;--surf:#1e2524;--surf2:#252e2c;
  --border:rgba(255,255,255,0.09);--text:#e4eeec;--muted:#7a9e99;
  --gold:#ddb896;--green:#7ec8a4;--ease:cubic-bezier(0.22,0.25,0,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Inter',-apple-system,sans-serif;
  background:var(--panel);color:var(--text);user-select:none;-webkit-user-select:none;}
body{display:flex;flex-direction:column;}

/* TOP BAR */
#topbar{background:var(--surf);border-bottom:1px solid var(--border);
  padding:max(10px,env(safe-area-inset-top)) 12px 10px;
  display:flex;align-items:center;gap:6px;flex-shrink:0;z-index:200;}
#topbar h1{font-size:0.85rem;color:var(--gold);font-weight:700;flex-shrink:0;margin-right:4px;}
.btn{padding:7px 12px;border-radius:9px;border:none;font-size:0.74rem;font-weight:600;
  cursor:pointer;white-space:nowrap;transition:transform 0.1s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.92);}
.btn-rose{background:var(--rose);color:#fff;}
.btn-sage{background:var(--sage-d);color:#fff;}
.btn-ghost{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border);}
.btn-gold{background:var(--gold);color:#251606;}
.btn-icon{width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.tb-right{display:flex;gap:5px;margin-left:auto;flex-shrink:0;}

/* PREVIEW */
#preview-wrap{flex:1;position:relative;overflow:hidden;background:#0a0e0d;min-height:0;touch-action:none;}
#preview-frame{border:none;width:100%;height:100%;display:block;}

/* OVERLAY — sits above iframe for interaction */
#overlay{position:absolute;inset:0;z-index:50;pointer-events:none;touch-action:none;}
#overlay.active{pointer-events:auto;}

/* selection ring */
#ring{position:absolute;display:none;pointer-events:none;}
.ring-border{position:absolute;inset:0;border:2px solid var(--rose);border-radius:6px;
  background:rgba(182,141,147,0.10);}
.ring-lbl{position:absolute;top:-22px;left:0;background:var(--rose);color:#fff;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.drag-h{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:44px;height:44px;background:rgba(182,141,147,0.25);border:2px solid rgba(182,141,147,0.7);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:grab;pointer-events:auto;display:none;}
.drag-h:active{cursor:grabbing;}
.corner-h{position:absolute;width:16px;height:16px;background:var(--gold);
  border-radius:3px;pointer-events:auto;display:none;}
.corner-h.br{bottom:-8px;right:-8px;cursor:nwse-resize;}
.corner-h.bl{bottom:-8px;left:-8px;cursor:nesw-resize;}

/* floating pill */
#pill{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(22,27,26,0.9);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:20px;
  padding:5px 16px;font-size:0.7rem;color:var(--gold);
  pointer-events:none;z-index:60;white-space:nowrap;
  transition:opacity 0.3s;opacity:0;}
#pill.vis{opacity:1;}

/* coord display */
#coord{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(22,27,26,0.9);backdrop-filter:blur(6px);
  border:1px solid var(--border);border-radius:20px;
  padding:4px 14px;font-size:0.68rem;color:var(--gold);
  font-family:monospace;pointer-events:none;z-index:60;
  opacity:0;transition:opacity 0.2s;white-space:nowrap;}
#coord.vis{opacity:1;}

/* BOTTOM SHEET */
#sheet{position:relative;flex-shrink:0;background:var(--surf);
  border-top:1px solid var(--border);display:flex;flex-direction:column;
  height:52px;transition:height 0.32s var(--ease);z-index:100;
  padding-bottom:env(safe-area-inset-bottom);}
#sheet.open{height:min(64vh,480px);}

#sh-handle{display:flex;align-items:center;height:52px;padding:0 14px;gap:10px;cursor:pointer;flex-shrink:0;}
#sh-pill{width:40px;height:4px;border-radius:2px;background:rgba(255,255,255,0.18);flex-shrink:0;}
#sh-name{font-size:0.82rem;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#sh-hint{font-size:0.7rem;color:var(--muted);flex-shrink:0;}

#sh-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;
  overflow-x:auto;scrollbar-width:none;display:none;}
#sh-tabs::-webkit-scrollbar{display:none;}
.stab{padding:8px 14px;font-size:0.62rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.05em;color:var(--muted);border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:color 0.15s;}
.stab.on{color:var(--gold);border-bottom-color:var(--gold);}

#sh-body{flex:1;overflow-y:auto;padding:12px 14px 20px;display:none;
  -webkit-overflow-scrolling:touch;}
#sh-body::-webkit-scrollbar{width:3px;}
#sh-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* pane helpers */
.sec{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--muted);margin:12px 0 6px;padding-bottom:3px;
  border-bottom:1px solid var(--border);}
.sec:first-child{margin-top:0;}

/* XY grid */
.xy-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.xy-cell{display:flex;flex-direction:column;gap:3px;}
.xy-lbl{font-size:0.62rem;color:var(--muted);text-align:center;}
.xy-inp{background:var(--panel);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:8px 6px;font-size:0.85rem;font-family:monospace;
  text-align:center;outline:none;width:100%;
  -webkit-user-select:text;user-select:text;transition:border-color 0.15s;}
.xy-inp:focus{border-color:var(--rose);}

/* D-pad */
.dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);
  gap:5px;margin:8px auto 10px;width:fit-content;}
.dp{width:44px;height:44px;border-radius:9px;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--text);font-size:1.1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.1s;-webkit-tap-highlight-color:transparent;}
.dp:active{background:rgba(182,141,147,0.30);}
.dp-center{background:rgba(255,255,255,0.03);font-size:0.65rem;color:var(--muted);cursor:default;}
.step-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;}
.step-row span{font-size:0.7rem;color:var(--muted);}
.sopt{padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:rgba(255,255,255,0.05);color:var(--muted);font-size:0.72rem;cursor:pointer;
  transition:background 0.1s;}
.sopt.on{background:var(--rose);color:#fff;border-color:var(--rose);}

/* range rows */
.rrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rlbl{font-size:0.7rem;color:var(--muted);width:72px;flex-shrink:0;line-height:1.3;}
.rng{-webkit-appearance:none;flex:1;height:5px;border-radius:3px;background:var(--border);cursor:pointer;}
.rng::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--rose);cursor:pointer;}
.rval{font-size:0.72rem;color:var(--gold);font-family:monospace;width:42px;text-align:right;flex-shrink:0;}

/* colour rows */
.crow{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.clbl{font-size:0.7rem;color:var(--muted);width:72px;flex-shrink:0;}
.csw{width:36px;height:32px;border-radius:6px;padding:2px 3px;cursor:pointer;flex-shrink:0;}
.cinp{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:6px 7px;font-size:0.72rem;font-family:monospace;outline:none;
  -webkit-user-select:text;user-select:text;transition:border-color 0.15s;}
.cinp:focus{border-color:var(--rose);}

/* token rows */
.trow{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tsw{width:34px;height:34px;border-radius:7px;border:none;cursor:pointer;flex-shrink:0;}
.tinfo{flex:1;min-width:0;}
.tname{font-size:0.76rem;font-weight:600;}
.thint{font-size:0.62rem;color:var(--muted);}
.tval{width:80px;background:var(--panel);border:1px solid var(--border);border-radius:6px;
  color:var(--text);padding:5px 6px;font-size:0.68rem;font-family:monospace;outline:none;
  flex-shrink:0;-webkit-user-select:text;user-select:text;}
.tval:focus{border-color:var(--rose);}

/* elements list */
.eli{background:var(--panel);border:1.5px solid var(--border);
  border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;
  transition:border-color 0.15s;}
.eli:active,.eli.on{border-color:var(--rose);background:rgba(182,141,147,0.07);}
.eli-n{font-size:0.82rem;font-weight:600;}
.eli-d{font-size:0.66rem;color:var(--muted);margin-top:2px;}

/* css pane */
#css-out{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:10px;font-size:0.65rem;font-family:monospace;color:#86efac;
  white-space:pre-wrap;line-height:1.6;word-break:break-all;min-height:60px;}
.css-btns{display:flex;gap:8px;margin-top:8px;}

.rbtn{width:100%;padding:9px;margin-top:8px;background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:8px;color:var(--muted);
  font-size:0.76rem;cursor:pointer;transition:background 0.15s;}
.rbtn:active{background:rgba(255,255,255,0.09);}

/* toast */
#toast{position:fixed;bottom:70px;left:50%;
  transform:translateX(-50%) translateY(40px);
  background:var(--rose);color:#fff;padding:8px 20px;border-radius:20px;
  font-size:0.82rem;font-weight:600;transition:transform 0.22s var(--ease);
  z-index:9999;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 18px rgba(0,0,0,0.4);}
#toast.up{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="topbar">
  <h1>✦ Maké Editor</h1>
  <div class="tb-right">
    <button class="btn btn-icon btn-rose" id="btn-sel" title="Select mode">☝</button>
    <button class="btn btn-icon btn-ghost" id="btn-drg" title="Drag mode">✥</button>
    <button class="btn btn-gold" id="btn-copy">Copy</button>
    <button class="btn btn-sage" id="btn-dl">↓ CSS</button>
    <button class="btn btn-icon btn-ghost" id="btn-rst" title="Reset all">↺</button>
  </div>
</div>

<div id="preview-wrap">
  <iframe id="preview-frame" src="index.html" sandbox="allow-scripts allow-same-origin"></iframe>
  <div id="overlay">
    <div id="ring">
      <div class="ring-border"></div>
      <div class="ring-lbl" id="ring-lbl"></div>
      <div class="drag-h" id="drag-h">✥</div>
      <div class="corner-h br" id="c-br"></div>
      <div class="corner-h bl" id="c-bl"></div>
    </div>
  </div>
  <div id="pill"></div>
  <div id="coord"></div>
</div>

<div id="sheet">
  <div id="sh-handle">
    <div id="sh-pill"></div>
    <span id="sh-name">Tap an element in the preview</span>
    <span id="sh-hint">↑</span>
  </div>
  <div id="sh-tabs">
    <div class="stab on"  data-s="pos">Position</div>
    <div class="stab"     data-s="size">Size</div>
    <div class="stab"     data-s="style">Style</div>
    <div class="stab"     data-s="list">Elements</div>
    <div class="stab"     data-s="tok">Colours</div>
    <div class="stab"     data-s="css">CSS</div>
  </div>
  <div id="sh-body">
    <div id="p-pos"></div>
    <div id="p-size"  style="display:none"></div>
    <div id="p-style" style="display:none"></div>
    <div id="p-list"  style="display:none"></div>
    <div id="p-tok"   style="display:none"></div>
    <div id="p-css"   style="display:none">
      <pre id="css-out">No changes yet.</pre>
      <div class="css-btns">
        <button class="btn btn-gold" style="flex:1" id="btn-copy2">📋 Copy CSS</button>
        <button class="btn btn-sage" style="flex:1" id="btn-dl2">⬇ Save file</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════
   MAKÉ LAYOUT EDITOR V2  — mobile-first
   ══════════════════════════════════════════════ */

/* ─── REGISTRY ─── */
const ELS = [
  { id:'app-bg',    label:'App background',   desc:'Sage bg colour',     sel:'body, #app',
    pos:[], size:[], style:[{k:'background',cv:'--sage',label:'Background',type:'color',def:'#9ba59a'}] },

  { id:'header',    label:'Header area',       desc:'Top section spacing', sel:'.app-header',
    pos:[{k:'padding-top',label:'Pad top',def:14,min:0,max:60},
         {k:'padding-bottom',label:'Pad bottom',def:4,min:0,max:40}],
    size:[], style:[] },

  { id:'title',     label:'Title — Maké',      desc:'Big italic heading',  sel:'.app-title',
    pos:[{k:'margin-top',label:'Top margin',def:-4,min:-40,max:40}],
    size:[{k:'font-size',label:'Font size',def:52,min:20,max:90}],
    style:[{k:'color',label:'Colour',type:'color',def:'#ffffff'},
           {k:'letter-spacing',label:'Tracking',type:'em',def:-0.03,min:-0.1,max:0.1,step:0.005}] },

  { id:'subtitle',  label:'Subtitle',          desc:'"Your personal command center"', sel:'.app-subtitle',
    pos:[{k:'margin-top',label:'Top margin',def:3,min:-10,max:30},
         {k:'margin-bottom',label:'Bottom margin',def:2,min:0,max:30}],
    size:[{k:'font-size',label:'Font size',def:16,min:10,max:28}],
    style:[{k:'color',label:'Colour',type:'color',def:'rgba(255,255,255,0.88)'}] },

  { id:'dw',        label:'Date widget',        desc:'Pink date pill',      sel:'.date-widget',
    pos:[],
    size:[{k:'padding-top',label:'Pad top',def:6,min:0,max:20},
          {k:'padding-bottom',label:'Pad bottom',def:8,min:0,max:20},
          {k:'padding-left',label:'Pad left',def:12,min:0,max:24},
          {k:'padding-right',label:'Pad right',def:12,min:0,max:24},
          {k:'border-radius',label:'Radius',def:16,min:0,max:32}],
    style:[{k:'background',cv:'--rose',label:'Background',type:'color',def:'#b68d93'}] },

  { id:'dw-day',    label:'Date — day name',    desc:'Italic "Friday"',     sel:'.date-widget-day',
    pos:[], size:[{k:'font-size',label:'Font size',def:15,min:8,max:28}],
    style:[{k:'color',label:'Colour',type:'color',def:'#ffffff'}] },

  { id:'dw-date',   label:'Date — date text',   desc:'"20 March 2026"',     sel:'.date-widget-date',
    pos:[], size:[{k:'font-size',label:'Font size',def:9,min:6,max:16}],
    style:[{k:'color',label:'Colour',type:'color',def:'rgba(255,255,255,0.75)'}] },

  { id:'burger',    label:'Burger button',       desc:'Pink menu btn',       sel:'.burger-btn',
    pos:[],
    size:[{k:'width',label:'Width',def:44,min:28,max:70},
          {k:'height',label:'Height',def:44,min:28,max:70},
          {k:'border-radius',label:'Radius',def:12,min:0,max:28}],
    style:[{k:'background',cv:'--rose',label:'Background',type:'color',def:'#b68d93'}] },

  { id:'cards',     label:'Cards',               desc:'Note/code/link cards', sel:'.card',
    pos:[],
    size:[{k:'border-radius',label:'Radius',def:16,min:0,max:28},
          {k:'padding',label:'Padding',def:11,min:4,max:24},
          {k:'min-height',label:'Min height',def:170,min:60,max:320},
          {k:'gap',label:'Gap',def:4,min:0,max:16}],
    style:[{k:'background',cv:'--dark-card',label:'Background',type:'color',def:'#3e3e3e'}] },

  { id:'grid',      label:'Card grid',            desc:'Column layout',       sel:'.grid',
    pos:[], size:[{k:'gap',label:'Gap',def:10,min:2,max:28}], style:[] },

  { id:'card-lbl',  label:'Card type label',      desc:'"Note: title"',       sel:'.card-type-label',
    pos:[], size:[{k:'font-size',label:'Font size',def:10.5,min:8,max:16}],
    style:[{k:'color',label:'Colour',type:'color',def:'rgba(255,255,255,0.90)'}] },

  { id:'card-cnt',  label:'Card content text',    desc:'Monospace preview',   sel:'.card-content',
    pos:[], size:[{k:'font-size',label:'Font size',def:10,min:7,max:14}],
    style:[{k:'color',label:'Colour',type:'color',def:'rgba(255,255,255,0.56)'}] },

  { id:'nav',       label:'Bottom nav bar',       desc:'Navigation bar',      sel:'.bottom-nav',
    pos:[{k:'padding-top',label:'Pad top',def:8,min:0,max:24},
         {k:'padding-bottom',label:'Pad bottom',def:22,min:0,max:50}],
    size:[], style:[{k:'background',cv:'--sage-deeper',label:'Background',type:'color',def:'#6b7c7a'}] },

  { id:'fab',       label:'FAB — + button',       desc:'Centre add button',   sel:'.nav-btn-fab',
    pos:[{k:'margin-top',label:'Lift upward',def:-10,min:-30,max:0}],
    size:[{k:'width',label:'Width',def:52,min:36,max:72},
          {k:'height',label:'Height',def:52,min:36,max:72},
          {k:'border-radius',label:'Radius',def:20,min:0,max:36}],
    style:[{k:'background',cv:'--rose',label:'Background',type:'color',def:'#b68d93'}] },

  { id:'nav-i',     label:'Nav icons',            desc:'Inactive icon colour', sel:'.nav-btn',
    pos:[], size:[], style:[{k:'color',label:'Colour',type:'color',def:'rgba(255,255,255,0.52)'}] },

  { id:'sticky',    label:'Sticky notes',         desc:'Draggable stickies',  sel:'.sticky-note',
    pos:[],
    size:[{k:'border-radius',label:'Radius',def:12,min:0,max:24},
          {k:'padding',label:'Padding',def:9,min:4,max:20}],
    style:[] },

  { id:'modal',     label:'Modals',               desc:'Dialog boxes',        sel:'.modal',
    pos:[],
    size:[{k:'border-radius',label:'Radius',def:24,min:0,max:36}],
    style:[{k:'background',label:'Background',type:'color',def:'#3a3a3a'}] },
];

const TOKENS = [
  {v:'--rose',       label:'Rose',          def:'#b68d93', hint:'Burger, FAB, tags'},
  {v:'--rose-dark',  label:'Rose dark',     def:'#9e7279', hint:'Pressed states'},
  {v:'--rose-light', label:'Rose light',    def:'#cdb0b5', hint:'Toggle knob'},
  {v:'--tan',        label:'Tan',           def:'#b6a486', hint:'Accent colour'},
  {v:'--sage',       label:'Sage (bg)',     def:'#9ba59a', hint:'App background'},
  {v:'--sage-dark',  label:'Sage dark',     def:'#7d8e8c', hint:'Surfaces'},
  {v:'--sage-deeper',label:'Sage deeper',   def:'#6b7c7a', hint:'Nav bar'},
  {v:'--dark-card',  label:'Card bg',       def:'#3e3e3e', hint:'All cards'},
  {v:'--dark-modal', label:'Modal bg',      def:'#3a3a3a', hint:'Modals'},
  {v:'--dark-drawer',label:'Drawer bg',     def:'#363636', hint:'Drawer'},
];

/* ─── STATE ─── */
let sel      = null;   // selected ELS entry
let ovr      = {};     // {selector:{prop:val}}
let tokOvr   = {};     // {'--var':'val'}
let origCSS  = null;
let mode     = 'select'; // 'select'|'drag'
let stab     = 'pos';
let step     = 2;
let isDrag   = false, isResize = false;
let dx0=0, dy0=0, mTop0=0, mLeft0=0, w0=0, h0=0;
let tt, pt;

const frame  = document.getElementById('preview-frame');
const overlay= document.getElementById('overlay');
const ring   = document.getElementById('ring');
const ringLbl= document.getElementById('ring-lbl');
const dragH  = document.getElementById('drag-h');
const cBR    = document.getElementById('c-br');
const cBL    = document.getElementById('c-bl');
const coordEl= document.getElementById('coord');
const pill   = document.getElementById('pill');
const sheet  = document.getElementById('sheet');
const shTabs = document.getElementById('sh-tabs');
const shBody = document.getElementById('sh-body');

/* ─── BOOT ─── */
window.addEventListener('load', async () => {
  buildListPane();
  buildTokenPane();
  setMode('select');
  overlay.classList.add('active');
  await fetchCSS();
  frame.addEventListener('load', () => { injectFrame(); applyAll(); });
  setupSheetDrag();

  // Top buttons
  document.getElementById('btn-sel').addEventListener('click',  () => setMode('select'));
  document.getElementById('btn-drg').addEventListener('click',  () => { if(sel) setMode('drag'); else showPill('Select an element first'); });
  document.getElementById('btn-rst').addEventListener('click',  resetAll);
  document.getElementById('btn-copy').addEventListener('click', copyCSS);
  document.getElementById('btn-dl').addEventListener('click',   dlCSS);
  document.getElementById('btn-copy2').addEventListener('click',copyCSS);
  document.getElementById('btn-dl2').addEventListener('click',  dlCSS);

  // Sheet tabs
  document.getElementById('sh-tabs').addEventListener('click', e => {
    const t = e.target.closest('.stab'); if(t) switchStab(t.dataset.s);
  });

  // Sheet handle
  document.getElementById('sh-handle').addEventListener('click', () => {
    if(sheet.classList.contains('open')) closeSheet();
    else if(sel) openSheet();
  });
});

async function fetchCSS() {
  try { const r = await fetch('./styles.css?'+Date.now()); origCSS = await r.text(); }
  catch { origCSS = null; }
}

/* ─── MODE ─── */
function setMode(m) {
  mode = m;
  document.getElementById('btn-sel').className = 'btn btn-icon ' + (m==='select'?'btn-rose':'btn-ghost');
  document.getElementById('btn-drg').className = 'btn btn-icon ' + (m==='drag'  ?'btn-rose':'btn-ghost');
  dragH.style.display  = m==='drag' ? 'flex' : 'none';
  cBR.style.display    = m==='drag' ? 'block': 'none';
  cBL.style.display    = m==='drag' ? 'block': 'none';
  showPill(m==='select' ? '☝ Tap to select' : '✥ Drag the handle to move');
}

/* ─── FRAME ─── */
function injectFrame() {
  try {
    const fw = frame.contentWindow, doc = fw.document;
    doc.addEventListener('click', e => {
      if(mode !== 'select') return;
      const el = findEl(e.target, doc);
      if(el) { e.preventDefault(); e.stopPropagation(); selectEl(el); }
    }, true);
    doc.addEventListener('touchstart', e => {
      if(mode === 'select') {
        const el = findEl(e.target, doc);
        if(el) e.preventDefault();
      }
    }, {passive:false});
  } catch(e) {}
}

function findEl(node, doc) {
  for(const el of ELS) {
    try {
      for(const m of doc.querySelectorAll(el.sel))
        if(m===node||m.contains(node)) return el;
    } catch {}
  }
  return null;
}

/* ─── RING ─── */
function drawRing() {
  if(!sel) { ring.style.display='none'; return; }
  try {
    const doc  = frame.contentWindow.document;
    const node = doc.querySelector(sel.sel);
    if(!node) { ring.style.display='none'; return; }
    const r = node.getBoundingClientRect();
    ring.style.cssText = `display:block;position:absolute;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;`;
    ringLbl.textContent = sel.label;
  } catch { ring.style.display='none'; }
}

/* ─── DRAG ON OVERLAY ─── */
overlay.addEventListener('pointerdown', e => {
  if(!sel || mode!=='drag') return;
  e.preventDefault();
  overlay.setPointerCapture(e.pointerId);

  if(e.target===cBR||e.target===cBL||e.target.closest('#c-br')||e.target.closest('#c-bl')) {
    isResize=true;
    dx0=e.clientX; dy0=e.clientY;
    try {
      const n=frame.contentWindow.document.querySelector(sel.sel);
      const r=n?.getBoundingClientRect();
      w0=r?.width||100; h0=r?.height||100;
    } catch { w0=100;h0=100; }
    return;
  }
  if(e.target===dragH||e.target.closest('#drag-h')) {
    isDrag=true;
    dx0=e.clientX; dy0=e.clientY;
    mTop0 = parseFloat(getOvr(sel.sel,'margin-top'))  || 0;
    mLeft0= parseFloat(getOvr(sel.sel,'margin-left')) || 0;
  }
});

overlay.addEventListener('pointermove', e => {
  if(!sel || mode!=='drag' || (!isDrag&&!isResize)) return;
  e.preventDefault();
  const ddx=e.clientX-dx0, ddy=e.clientY-dy0;
  if(isResize) {
    const nw=Math.max(20,w0+ddx), nh=Math.max(20,h0+ddy);
    setOvr(sel.sel,'width', nw+'px');
    setOvr(sel.sel,'height',nh+'px');
    showCoord(`w:${Math.round(nw)}  h:${Math.round(nh)}`);
  } else {
    const nmt=Math.round(mTop0+ddy), nml=Math.round(mLeft0+ddx);
    setOvr(sel.sel,'margin-top', nmt+'px');
    setOvr(sel.sel,'margin-left',nml+'px');
    showCoord(`↕${nmt}px  ↔${nml}px`);
    syncPosInputs();
  }
  applyAll(); drawRing();
});

overlay.addEventListener('pointerup', e => {
  if(isDrag||isResize) { isDrag=isResize=false; updateCSSPane(); hideCoord(); }
});
overlay.addEventListener('pointercancel', ()=>{ isDrag=isResize=false; hideCoord(); });

/* ─── SELECT ─── */
function selectEl(el) {
  sel = el;
  document.querySelectorAll('.eli').forEach(r => r.classList.toggle('on', r.dataset.id===el.id));
  document.getElementById('sh-name').textContent = el.label;
  document.getElementById('sh-hint').textContent = '↓';
  openSheet();
  buildPosPane(); buildSizePane(); buildStylePane();
  switchStab('pos');
  drawRing();
  showPill(el.label + ' selected');
}

/* ─── SHEET ─── */
function openSheet() {
  sheet.classList.add('open');
  shTabs.style.display='flex';
  shBody.style.display='block';
}
function closeSheet() {
  sheet.classList.remove('open');
  setTimeout(()=>{ if(!sheet.classList.contains('open')){ shTabs.style.display='none'; shBody.style.display='none'; }},330);
}
function setupSheetDrag() {
  const h = document.getElementById('sh-handle');
  let sy=0, sh0=0, dragging=false;
  h.addEventListener('touchstart', e=>{ sy=e.touches[0].clientY; sh0=sheet.offsetHeight; dragging=true; },{passive:true});
  document.addEventListener('touchmove', e=>{ if(!dragging)return; const dy=sy-e.touches[0].clientY; sheet.style.height=Math.max(52,Math.min(window.innerHeight*0.82,sh0+dy))+'px'; sheet.style.transition='none'; },{passive:true});
  document.addEventListener('touchend', ()=>{ if(!dragging)return; dragging=false; sheet.style.transition=''; if(sheet.offsetHeight<100) closeSheet(); else sheet.classList.add('open'); });
}

function switchStab(s) {
  stab=s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));
  ['pos','size','style','list','tok','css'].forEach(id=>{
    document.getElementById('p-'+id).style.display=id===s?'':'none';
  });
  if(s==='css') updateCSSPane();
}

/* ─── POSITION PANE ─── */
function buildPosPane() {
  const p = document.getElementById('p-pos');
  p.innerHTML='';
  if(!sel) return;

  // XY inputs
  p.appendChild(mkSec('Position (margin offset)'));
  const g = document.createElement('div'); g.className='xy-grid';
  [
    {id:'xy-mt',label:'↕ Y (Top)',  prop:'margin-top'},
    {id:'xy-ml',label:'↔ X (Left)', prop:'margin-left'},
    {id:'xy-mb',label:'↓ Bottom',   prop:'margin-bottom'},
    {id:'xy-mr',label:'→ Right',    prop:'margin-right'},
  ].forEach(f=>{
    const cur=parseFloat(getOvr(sel.sel,f.prop))||0;
    const c=document.createElement('div'); c.className='xy-cell';
    c.innerHTML=`<div class="xy-lbl">${f.label}</div><input class="xy-inp" id="${f.id}" type="number" value="${cur}" step="1">`;
    c.querySelector('input').addEventListener('input',e=>{
      setOvr(sel.sel,f.prop,e.target.value+'px'); applyAll(); drawRing(); updateCSSPane();
    });
    g.appendChild(c);
  });
  p.appendChild(g);

  // Step selector
  p.appendChild(mkSec('Nudge'));
  const sr=document.createElement('div'); sr.className='step-row';
  sr.innerHTML='<span>Step:</span>';
  [1,2,5,10].forEach(s=>{
    const b=document.createElement('button');
    b.className='sopt'+(s===step?' on':''); b.textContent=s+'px';
    b.addEventListener('click',()=>{ step=s; buildPosPane(); });
    sr.appendChild(b);
  });
  p.appendChild(sr);

  // D-pad
  const dp=document.createElement('div'); dp.className='dpad';
  const map=[null,{d:'up',i:'▲'},null,{d:'left',i:'◀'},{center:true},{d:'right',i:'▶'},null,{d:'down',i:'▼'},null];
  map.forEach(m=>{
    const b=document.createElement('button');
    if(!m){b.style.visibility='hidden';b.className='dp';}
    else if(m.center){b.className='dp dp-center';b.textContent=step+'px';b.disabled=true;}
    else{b.className='dp';b.textContent=m.i;b.addEventListener('click',()=>nudge(m.d));}
    dp.appendChild(b);
  });
  p.appendChild(dp);

  // pos props from registry
  if(sel.pos.length){
    p.appendChild(mkSec('Spacing overrides'));
    sel.pos.forEach(prop=>p.appendChild(mkRange(prop)));
  }

  p.appendChild(mkReset());
}

function nudge(dir) {
  if(!sel) return;
  const map={up:['margin-top',-step],down:['margin-top',+step],left:['margin-left',-step],right:['margin-left',+step]};
  const [prop,delta]=map[dir];
  const cur=parseFloat(getOvr(sel.sel,prop))||0;
  setOvr(sel.sel,prop,(cur+delta)+'px');
  applyAll(); drawRing(); updateCSSPane(); syncPosInputs();
}

function syncPosInputs() {
  if(!sel) return;
  const mt=document.getElementById('xy-mt'); if(mt) mt.value=parseFloat(getOvr(sel.sel,'margin-top'))||0;
  const ml=document.getElementById('xy-ml'); if(ml) ml.value=parseFloat(getOvr(sel.sel,'margin-left'))||0;
}

/* ─── SIZE PANE ─── */
function buildSizePane() {
  const p=document.getElementById('p-size'); p.innerHTML='';
  if(!sel) return;

  p.appendChild(mkSec('Width & Height'));
  const g=document.createElement('div'); g.className='xy-grid';
  ['width','height'].forEach(prop=>{
    const cur=parseFloat(getOvr(sel.sel,prop))||'';
    const c=document.createElement('div'); c.className='xy-cell';
    c.innerHTML=`<div class="xy-lbl">${prop}</div><input class="xy-inp" type="number" placeholder="auto" value="${cur}" step="1">`;
    c.querySelector('input').addEventListener('input',e=>{
      const v=e.target.value;
      if(v) setOvr(sel.sel,prop,v+'px');
      else { if(ovr[sel.sel]) delete ovr[sel.sel][prop]; }
      applyAll(); drawRing(); updateCSSPane();
    });
    g.appendChild(c);
  });
  p.appendChild(g);

  if(sel.size.length){
    p.appendChild(mkSec('Size & spacing'));
    sel.size.forEach(prop=>p.appendChild(mkRange(prop)));
  }
  p.appendChild(mkReset());
}

/* ─── STYLE PANE ─── */
function buildStylePane() {
  const p=document.getElementById('p-style'); p.innerHTML='';
  if(!sel||!sel.style.length){
    p.innerHTML='<p style="color:var(--muted);font-size:0.78rem;margin-top:8px">No style props for this element.</p>';
    return;
  }
  p.appendChild(mkSec('Colours & typography'));
  sel.style.forEach(prop=>{
    if(prop.type==='color'){
      const cur=getOvr(sel.sel,prop.k)||prop.def;
      const hex=toHex(cur)||'#ffffff';
      const row=document.createElement('div'); row.className='crow';
      row.innerHTML=`<span class="clbl">${prop.label}</span>
        <input class="csw" type="color" value="${hex}">
        <input class="cinp" type="text" value="${cur}">`;
      const ci=row.querySelector('[type=color]'), ti=row.querySelector('.cinp');
      ci.addEventListener('input',()=>{ ti.value=ci.value; applyStyle(prop,ci.value); });
      ti.addEventListener('change',()=>{ applyStyle(prop,ti.value); const h=toHex(ti.value); if(h) ci.value=h; });
      p.appendChild(row);
    } else {
      p.appendChild(mkRange(prop));
    }
  });
  p.appendChild(mkReset());
}

function applyStyle(prop,val) {
  setOvr(sel.sel,prop.k,val);
  if(prop.cv){ tokOvr[prop.cv]=val; refreshTokInputs(); }
  applyAll(); updateCSSPane();
}

/* ─── LIST PANE ─── */
function buildListPane() {
  const p=document.getElementById('p-list');
  p.innerHTML='<p style="font-size:0.72rem;color:var(--muted);margin-bottom:10px">Or tap directly in the preview.</p>';
  ELS.forEach(el=>{
    const r=document.createElement('div'); r.className='eli'; r.dataset.id=el.id;
    r.innerHTML=`<div class="eli-n">${el.label}</div><div class="eli-d">${el.desc}</div>`;
    r.addEventListener('click',()=>{ selectEl(el); switchStab('pos'); });
    p.appendChild(r);
  });
}

/* ─── TOKEN PANE ─── */
function buildTokenPane() {
  const p=document.getElementById('p-tok');
  p.innerHTML='<p style="font-size:0.72rem;color:var(--muted);margin-bottom:12px">Global tokens — cascade everywhere.</p>';
  TOKENS.forEach(tok=>{
    const cur=tokOvr[tok.v]||tok.def;
    const hex=toHex(cur)||cur;
    const r=document.createElement('div'); r.className='trow';
    r.innerHTML=`<input class="tsw" type="color" value="${hex}" data-tv="${tok.v}">
      <div class="tinfo"><div class="tname">${tok.label}</div><div class="thint">${tok.hint}</div></div>
      <input class="tval" type="text" value="${cur}" data-tt="${tok.v}">`;
    const ci=r.querySelector('[type=color]'), ti=r.querySelector('.tval');
    ci.addEventListener('input',()=>{ ti.value=ci.value; setTok(tok.v,ci.value); });
    ti.addEventListener('change',()=>{ setTok(tok.v,ti.value); const h=toHex(ti.value); if(h) ci.value=h; });
    p.appendChild(r);
  });
  const rb=document.createElement('button'); rb.className='rbtn'; rb.textContent='↺ Reset all colours';
  rb.addEventListener('click',()=>{ tokOvr={}; buildTokenPane(); applyAll(); updateCSSPane(); toast('Colours reset'); });
  p.appendChild(rb);
}

function setTok(v,val) { tokOvr[v]=val; applyAll(); updateCSSPane(); }
function refreshTokInputs() {
  document.querySelectorAll('[data-tv]').forEach(el=>{ const v=tokOvr[el.dataset.tv]; if(v){el.value=toHex(v)||v;} });
  document.querySelectorAll('[data-tt]').forEach(el=>{ const v=tokOvr[el.dataset.tt]; if(v) el.value=v; });
}

/* ─── OVERRIDES ─── */
function getOvr(s,p) { return ovr[s]?.[p]; }
function setOvr(s,p,v) { if(!ovr[s]) ovr[s]={}; ovr[s][p]=v; }

/* ─── APPLY ─── */
function applyAll() {
  try {
    const doc=frame.contentWindow.document;
    doc.getElementById('make-ed')?.remove();
    const rules=[];
    const tr=Object.entries(tokOvr).map(([k,v])=>`  ${k}: ${v};`).join('\n');
    if(tr) rules.push(`:root {\n${tr}\n}`);
    Object.entries(ovr).forEach(([s,props])=>{
      const d=Object.entries(props).map(([k,v])=>`  ${k}: ${v} !important;`).join('\n');
      if(d) rules.push(`${s} {\n${d}\n}`);
    });
    if(!rules.length) return;
    const st=doc.createElement('style'); st.id='make-ed'; st.textContent=rules.join('\n\n');
    doc.head.appendChild(st);
    drawRing();
  } catch(e) {}
}

/* ─── CSS PANE ─── */
function updateCSSPane() {
  const lines=[];
  if(Object.keys(tokOvr).length){
    lines.push(':root {');
    Object.entries(tokOvr).forEach(([k,v])=>lines.push(`  ${k}: ${v};`));
    lines.push('}','');
  }
  Object.entries(ovr).forEach(([s,props])=>{
    if(!Object.keys(props).length) return;
    lines.push(`${s} {`);
    Object.entries(props).forEach(([k,v])=>lines.push(`  ${k}: ${v};`));
    lines.push('}','');
  });
  document.getElementById('css-out').textContent=lines.length?lines.join('\n'):'No changes yet.';
}

function copyCSS() {
  const css=buildFinalCSS();
  if(navigator.clipboard) navigator.clipboard.writeText(css).then(()=>toast('Copied — paste into styles.css'));
  else { const t=document.createElement('textarea');t.value=css;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();toast('Copied!'); }
}
function dlCSS() {
  const b=new Blob([buildFinalCSS()],{type:'text/css'});
  const u=URL.createObjectURL(b); const a=document.createElement('a');
  a.href=u; a.download='styles.css'; a.click(); URL.revokeObjectURL(u);
  toast('Downloaded — replace styles.css in your repo');
}
function buildFinalCSS() {
  const hdr='/* Maké Editor overrides — append to bottom of styles.css */\n\n';
  const lines=[hdr];
  if(Object.keys(tokOvr).length){ lines.push(':root {'); Object.entries(tokOvr).forEach(([k,v])=>lines.push(`  ${k}: ${v};`)); lines.push('}',''); }
  Object.entries(ovr).forEach(([s,props])=>{ if(!Object.keys(props).length)return; lines.push(`${s} {`); Object.entries(props).forEach(([k,v])=>lines.push(`  ${k}: ${v};`)); lines.push('}',''); });
  return origCSS ? origCSS+'\n\n'+lines.join('\n') : lines.join('\n');
}

function resetAll() {
  if(!confirm('Reset ALL changes?')) return;
  ovr={}; tokOvr={};
  buildTokenPane();
  try { frame.contentWindow.document.getElementById('make-ed')?.remove(); } catch {}
  updateCSSPane(); drawRing();
  if(sel){ buildPosPane(); buildSizePane(); buildStylePane(); }
  toast('All reset');
}

/* ─── DOM HELPERS ─── */
function mkSec(t) { const d=document.createElement('div'); d.className='sec'; d.textContent=t; return d; }

function mkRange(prop) {
  const cur=parseFloat(getOvr(sel?.sel,prop.k))||parseFloat(prop.def)||0;
  const unit=prop.type==='em'?'em':'px';
  const w=document.createElement('div');
  w.innerHTML=`<div class="rrow"><span class="rlbl">${prop.label}</span>
    <input class="rng" type="range" min="${prop.min??0}" max="${prop.max??100}" step="${prop.step??1}" value="${cur}">
    <span class="rval">${cur}${unit}</span></div>`;
  const r=w.querySelector('.rng'), v=w.querySelector('.rval');
  r.addEventListener('input',()=>{
    const val=parseFloat(r.value);
    v.textContent=val+unit;
    setOvr(sel.sel,prop.k,val+unit);
    if(prop.cv){ tokOvr[prop.cv]=val+unit; refreshTokInputs(); }
    applyAll(); drawRing(); updateCSSPane();
  });
  return w;
}

function mkReset() {
  const b=document.createElement('button'); b.className='rbtn';
  b.textContent='↺ Reset '+(sel?.label||'element')+' to defaults';
  b.addEventListener('click',()=>{
    if(sel&&ovr[sel.sel]) delete ovr[sel.sel];
    buildPosPane(); buildSizePane(); buildStylePane();
    applyAll(); updateCSSPane(); toast('Reset');
  });
  return b;
}

/* ─── UI HELPERS ─── */
function showPill(msg) { pill.textContent=msg; pill.classList.add('vis'); clearTimeout(pt); pt=setTimeout(()=>pill.classList.remove('vis'),2600); }
function showCoord(msg) { coordEl.textContent=msg; coordEl.classList.add('vis'); }
function hideCoord() { setTimeout(()=>coordEl.classList.remove('vis'),1200); }
function toHex(v) {
  if(!v||typeof v!=='string') return null;
  if(v.startsWith('#')&&v.length===7) return v;
  const m=v.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if(!m) return null;
  return '#'+[m[1],m[2],m[3]].map(n=>(+n).toString(16).padStart(2,'0')).join('');
}
function toast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('up');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('up'),2600);
}
</script>
